<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>CNC5000 Compare v5.8</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
/* ─── 完全複製您 v5.7 的 CSS ─── */
:root { --bg:#0f1117; --card:#1a1d27; --border:#2e3244; }
html,body { margin:0;padding:0;font-family:'Segoe UI','Microsoft JhengHei',sans-serif;background:#0f1117;color:#e4e6ef;font-size:14px;line-height:1.6; }
*{box-sizing:border-box;margin:0;padding:0;}
.header{background:#1a1d27;border-bottom:1px solid #2e3244;padding:12px 20px;display:flex;align-items:center;gap:16px;}
.header-title{font-size:15px;font-weight:600;color:#e4e6ef;}
.header-stats{font-size:12px;color:#8b8fa7;margin-left:auto;display:none;}
.main{max-width:1500px;margin:0 auto;padding:16px;}
.upload-section{display:flex;gap:12px;margin-bottom:14px;}
.upload-card{flex:1;background:#1a1d27;border:2px dashed #2e3244;border-radius:8px;padding:20px 12px;text-align:center;cursor:pointer;position:relative;}
.upload-card.loaded{border-style:solid;border-color:#22c55e;background:#0f1117;}
.upload-card input{position:absolute;top:0;left:0;right:0;bottom:0;opacity:0;cursor:pointer;width:100%;height:100%;z-index:5;}
.upload-filename{margin-top:10px;font-size:12px;color:#3b82f6;font-weight:500;}
.compare-btn{padding:10px 40px;background:#3b82f6;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;}
.pb{height:3px;background:#2e3244;margin:10px 0;display:none;overflow:hidden;}
.pf{height:100%;background:#3b82f6;width:0%;transition:width 0.3s;}
.tab-bar{display:flex;gap:4px;background:#1a1d27;padding:4px;border-radius:8px;margin-bottom:16px;}
.tab-btn{flex:1;padding:8px;background:transparent;border:none;color:#8b8fa7;cursor:pointer;position:relative;}
.tab-btn.active{background:#3b82f6;color:#fff;border-radius:6px;}
.tab-badge{position:absolute;top:2px;right:2px;background:#ef4444;color:#fff;font-size:10px;padding:1px 5px;border-radius:10px;}
.tab-pane{display:none;}
.tab-pane.active{display:block;}
.results-wrap{background:#1a1d27;border:1px solid #2e3244;border-radius:8px;}
.sec-hdr{background:#1e2230;padding:10px 16px;cursor:pointer;border-bottom:1px solid #2e3244;}
.sec-body{display:none;padding:8px 0;background:#0f1117;}
.r-row{display:flex;padding:6px 16px;border-bottom:1px solid rgba(255,255,255,0.03);}
.r-row.diff{background:rgba(251,191,36,0.08);}
.r-key{width:280px;color:#8b8fa7;}
.r-val{flex:1;}
.r-val.old{color:#ef4444;text-decoration:line-through;margin-right:8px;}
.r-val.new{color:#22c55e;font-weight:600;}

/* ─── Activation UI ─── */
#authOverlay { position:fixed; inset:0; z-index:9999; background:#0f1117; display:flex; align-items:center; justify-content:center; }
.auth-box { background:#1a1d27; border:1px solid #2e3244; border-radius:12px; width:400px; padding:32px; }
.auth-field { margin-bottom:20px; }
.auth-field label { display:block; font-size:12px; color:#8b8fa7; margin-bottom:8px; }
.auth-field input { width:100%; background:#0f1117; border:1px solid #2e3244; padding:12px; color:#fff; border-radius:6px; }
.auth-err { color:#ef4444; font-size:12px; margin-top:12px; text-align:center; display:none; }

/* 初始狀態：隱藏 App */
#mainAppWrapper { visibility: hidden; height: 0; overflow: hidden; }
</style>
</head>
<body oncontextmenu="return false">

<div id="authOverlay">
  <div class="auth-box">
    <div style="text-align:center;margin-bottom:28px;">
      <span style="font-size:32px;">🔧</span>
      <div style="font-size:20px;font-weight:700;color:#fff;">CNC5000 Compare</div>
      <div style="font-size:12px;color:#8b8fa7;">SAP_TW · v5.8</div>
    </div>
    <div class="auth-field">
      <label>Email</label>
      <input type="email" id="authEmail">
    </div>
    <div class="auth-field">
      <label>Activation Code</label>
      <input type="text" id="authCode">
    </div>
    <button onclick="handleActivation()" style="width:100%;background:#3b82f6;color:#fff;border:none;padding:12px;border-radius:6px;font-weight:600;cursor:pointer;">Activate This Device</button>
    <div id="authMsg" class="auth-err"></div>
    <div style="margin-top:28px;text-align:center;font-size:12px;color:#5f6380;border-top:1px solid #2e3244;padding-top:20px;">
      Rene Lai · <a href="mailto:rene.lai@schmoll-asia.com" style="color:#3b82f6;text-decoration:none;">rene.lai@schmoll-asia.com</a>
    </div>
  </div>
</div>

<div id="mainAppWrapper">
  <div class="header">
    <div class="header-title">CNC5000 Compare <span style="font-size:13px;opacity:0.6;">v5.8</span></div>
    <div class="header-stats" id="hStats">差異數: <span id="stDif" style="color:#fbbf24;">0</span></div>
  </div>

  <div class="main">
    <div class="upload-section">
      <div class="upload-card" id="upA">
        <input type="file" id="fA" accept=".zip" onchange="handleFile('A',this)" />
        <div class="upload-label">設備 A 備份檔</div>
        <div class="upload-filename" id="fnA"></div>
      </div>
      <div class="upload-card" id="upB">
        <input type="file" id="fB" accept=".zip" onchange="handleFile('B',this)" />
        <div class="upload-label">設備 B 備份檔</div>
        <div class="upload-filename" id="fnB"></div>
      </div>
    </div>

    <div id="cmpBtnWrap" style="display:none;text-align:center;margin:20px 0;">
      <button class="compare-btn" onclick="runComparison()">開始比較</button>
    </div>

    <div class="pb" id="pb"><div class="pf" id="pf"></div></div>

    <div id="tabSection" style="display:none;">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('cncinfo', this)">CNC Info</button>
        <button class="tab-btn" onclick="switchTab('machopts', this)">Machine Options<span class="tab-badge" id="badge-machopts" style="display:none;"></span></button>
        <button class="tab-btn" onclick="switchTab('userlevel', this)">User Level</button>
      </div>
      <div class="tab-pane active" id="pane-cncinfo"><div id="cncInfoContent"></div></div>
      <div class="tab-pane" id="pane-machopts"><div class="results-wrap" id="moResults"></div></div>
      <div class="tab-pane" id="pane-userlevel"><div class="results-wrap" id="ulResults"></div></div>
    </div>
  </div>
</div>

<script>
// --- Firebase Config ---
const firebaseConfig = {
    apiKey: "AIzaSyAznXtBqrp8GDG6P387TXeuvHCiOQhJc4c",
    authDomain: "cnc5000-62bea.firebaseapp.com",
    databaseURL: "https://cnc5000-62bea-default-rtdb.firebaseio.com/",
    projectId: "cnc5000-62bea",
    storageBucket: "cnc5000-62bea.firebasestorage.app",
    messagingSenderId: "197550131427",
    appId: "1:197550131427:web:96da32dbabcb9d26359dd6"
};
firebase.initializeApp(firebaseConfig);

// --- Activation 邏輯 ---
async function handleActivation() {
    const email = document.getElementById('authEmail').value.trim();
    const code = document.getElementById('authCode').value.trim();
    const msg = document.getElementById('authMsg');
    
    try {
        await firebase.auth().signInWithEmailAndPassword(email, code);
        const fp = await FingerprintJS.load();
        const result = await fp.get();
        const deviceId = result.visitorId;
        const safeEmail = email.replace(/\./g, ',');
        const dbRef = firebase.database().ref('users/' + safeEmail);

        dbRef.once('value', (snapshot) => {
            let data = snapshot.val() || { devices: [] };
            let devs = data.devices || [];
            if (devs.includes(deviceId) || devs.length < 2) {
                if (!devs.includes(deviceId)) { devs.push(deviceId); dbRef.update({ devices: devs }); }
                document.getElementById('authOverlay').style.display = 'none';
                // 顯示主程式
                document.getElementById('mainAppWrapper').style.visibility = 'visible';
                document.getElementById('mainAppWrapper').style.height = 'auto';
            } else {
                msg.innerText = "授權上限已滿 (2台)"; msg.style.display = 'block';
                firebase.auth().signOut();
            }
        });
    } catch (e) {
        msg.innerText = "驗證失敗"; msg.style.display = 'block';
    }
}

// --- 原始 v5.7 核心比較邏輯 (修復 ID 連結) ---
var zipA=null, zipB=null, dataA={}, dataB={};

async function handleFile(side, input){
  var file = input.files[0]; if(!file) return;
  document.getElementById('fn'+side).innerText = file.name;
  document.getElementById('up'+side).classList.add('loaded');
  var buf = await file.arrayBuffer();
  var zip = await JSZip.loadAsync(buf);
  if(side==='A') zipA = zip; else zipB = zip;
  if(zipA && zipB) document.getElementById('cmpBtnWrap').style.display='block';
}

async function runComparison(){
  document.getElementById('pb').style.display='block';
  document.getElementById('pf').style.width='30%';
  
  dataA = await parseZip(zipA);
  dataB = await parseZip(zipB);
  
  document.getElementById('pf').style.width='100%';
  setTimeout(()=>{
    document.getElementById('pb').style.display='none';
    document.getElementById('tabSection').style.display='block';
    renderInfo();
    renderMO();
    document.getElementById('hStats').style.display='block';
  }, 400);
}

async function parseZip(zip){
  let res = { info:{}, mo:[] };
  let f_info = zip.file("cnc_info.txt");
  if(f_info) {
    let txt = await f_info.async("string");
    txt.split('\n').forEach(line=>{
      let p=line.split(':');
      if(p.length>=2) res.info[p[0].trim()] = p[1].trim();
    });
  }
  let f_mo = zip.file("machine_options.txt");
  if(f_mo) {
    let txt = await f_mo.async("string"), cur='';
    txt.split('\n').forEach(l=>{
      l=l.trim(); if(!l)return;
      if(l.startsWith('[')&&l.endsWith(']')) cur=l.slice(1,-1);
      else { let p=l.split('='); if(p.length>=2) res.mo.push({s:cur,k:p[0],v:p[1]}); }
    });
  }
  return res;
}

function renderInfo(){
  let h='<div style="padding:16px;">';
  for(let k in dataA.info){
    let vA=dataA.info[k], vB=dataB.info[k]||'--';
    h+=`<div class="r-row ${vA!==vB?'diff':''}">
      <div class="r-key">${k}</div>
      <div class="r-val">${vA!==vB?`<span class="old">${vA}</span><span class="new">${vB}</span>`:vA}</div>
    </div>`;
  }
  document.getElementById('cncInfoContent').innerHTML=h+'</div>';
}

function renderMO(){
  let h='', diffCount=0;
  let groups = {};
  dataA.mo.forEach(i=>{ if(!groups[i.s])groups[i.s]=[]; groups[i.s].push(i); });
  for(let s in groups){
    let sub='', sDiff=0;
    groups[s].forEach(i=>{
      let match = dataB.mo.find(b=>b.s===i.s && b.k===i.k);
      let vB = match?match.v:'MISSING';
      if(i.v!==vB){ 
        diffCount++; sDiff++;
        sub+=`<div class="r-row diff"><div class="r-key">${i.k}</div><div class="r-val"><span class="old">${i.v}</span><span class="new">${vB}</span></div></div>`;
      } else {
        sub+=`<div class="r-row"><div class="r-key">${i.k}</div><div class="r-val">${i.v}</div></div>`;
      }
    });
    h+=`<div class="sec-block">
      <div class="sec-hdr" onclick="let b=this.nextElementSibling;b.style.display=b.style.display==='block'?'none':'block'">
        <div style="font-size:13px;font-weight:600;">${s} ${sDiff?`<span style="color:#fbbf24;">(${sDiff})</span>`:''}</div>
      </div>
      <div class="sec-body">${sub}</div>
    </div>`;
  }
  document.getElementById('moResults').innerHTML=h;
  document.getElementById('stDif').innerText = diffCount;
  if(diffCount){
    document.getElementById('badge-machopts').style.display='inline-block';
    document.getElementById('badge-machopts').innerText=diffCount;
  }
}

function switchTab(t, btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-'+t).classList.add('active');
}
</script>
</body>
</html>
