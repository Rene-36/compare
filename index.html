<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#0f1117">
<title>CNC5000 Compare v5.8 - 完整功能版</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
/* --- 視覺風格區 --- */
:root { --bg:#0f1117; --card:#1a1d27; --border:#2e3244; --blue:#3b82f6; --text:#e4e6ef; --sub:#8b8fa7; --warn:#fbbf24; }
html,body { margin:0;padding:0;font-family:'Segoe UI','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;height:100%; overflow:hidden; }
*{box-sizing:border-box;}

/* 登入遮罩 */
#authOverlay { position:fixed;inset:0;z-index:20000;background:var(--bg);display:flex;align-items:center;justify-content:center;background-image:radial-gradient(circle at 50% 50%, #1e2230 0%, #0f1117 100%); }
.auth-card { background:var(--card); border:1px solid var(--border); border-radius:16px; width:90%; max-width:400px; padding:40px; box-shadow:0 20px 50px rgba(0,0,0,0.5); position:relative; }
.auth-card::before { content:''; position:absolute; top:0; left:0; width:100%; height:4px; background:linear-gradient(90deg, #3b82f6, #60a5fa); border-radius:16px 16px 0 0; }
.auth-title { font-size:24px; font-weight:700; text-align:center; margin-bottom:8px; color:#fff; }
.auth-input { width:100%; background:#0f1117; border:1px solid var(--border); padding:12px 16px; color:#fff; border-radius:8px; font-size:15px; outline:none; margin-bottom:20px; }
.auth-btn { width:100%; padding:14px; background:var(--blue); color:#fff; border:none; border-radius:8px; font-weight:700; cursor:pointer; }

/* 主介面 */
#mainApp { display:none; flex-direction:column; height:100vh; }
.header { background:var(--card); border-bottom:1px solid var(--border); padding:12px 20px; display:flex; justify-content:space-between; align-items:center; }
.main-content { flex:1; overflow-y:auto; padding:20px; }

/* 檔案上傳 */
.upload-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
.up-card { background:var(--card); border:2px dashed var(--border); border-radius:12px; padding:25px; text-align:center; cursor:pointer; transition: 0.3s; }
.up-card.active { border-color:#22c55e; background:rgba(34,197,94,0.05); }

/* 頁籤 */
.tabs { display:flex; gap:5px; margin-bottom:15px; border-bottom:1px solid var(--border); }
.tab-btn { padding:10px 20px; background:transparent; border:none; color:var(--sub); cursor:pointer; font-weight:600; position:relative; }
.tab-btn.active { color:var(--blue); }
.tab-btn.active::after { content:''; position:absolute; bottom:-1px; left:0; width:100%; height:2px; background:var(--blue); }
.badge { background:#ef4444; color:#fff; font-size:10px; padding:2px 6px; border-radius:10px; margin-left:5px; }

/* 比對結果表格樣式 (移植自 v5.7) */
.sec-block { background:var(--card); border:1px solid var(--border); border-radius:8px; margin-bottom:10px; }
.sec-hdr { padding:10px 15px; background:rgba(255,255,255,0.03); cursor:pointer; font-weight:700; display:flex; justify-content:space-between; }
.sec-body { display:none; padding:10px; border-top:1px solid var(--border); }
.row-item { display:flex; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.03); font-size:13px; }
.row-item.diff { background:rgba(251,191,36,0.08); }
.col-key { width:40%; color:var(--sub); font-family:monospace; }
.old-val { color:#ef4444; text-decoration:line-through; margin-right:8px; }
.new-val { color:#22c55e; font-weight:700; }
</style>
</head>
<body>

<div id="authOverlay">
  <div class="auth-card">
    <div class="auth-title">CNC5000 <span>Compare</span></div>
    <p style="text-align:center; color:var(--sub); font-size:12px;">授權驗證系統 v5.8</p>
    <input type="email" id="authEmail" class="auth-input" placeholder="帳號 (Email)">
    <input type="password" id="authCode" class="auth-input" placeholder="啟動序號">
    <button onclick="handleActivation()" class="auth-btn">驗證並啟動</button>
    <div id="authMsg" style="color:#ef4444; font-size:12px; margin-top:15px; text-align:center; display:none;"></div>
  </div>
</div>

<div id="mainApp">
  <div class="header">
    <div style="font-weight:700; font-size:16px;">CNC5000 Compare v5.8</div>
    <div id="hStats" style="font-size:12px; color:var(--sub); display:none;">
      區段: <span id="stSec">0</span> | 差異: <span id="stDif" style="color:var(--warn); font-weight:800;">0</span>
    </div>
  </div>

  <div class="main-content">
    <div class="upload-grid">
      <div class="up-card" id="upA" onclick="document.getElementById('fA').click()">
        <input type="file" id="fA" accept=".zip" onchange="handleFile('A',this)" style="display:none;">
        <div style="font-weight:700;">設備 A 備份</div>
        <div id="fnA" style="font-size:11px; color:var(--blue); margin-top:5px;">點擊選擇 ZIP</div>
      </div>
      <div class="up-card" id="upB" onclick="document.getElementById('fB').click()">
        <input type="file" id="fB" accept=".zip" onchange="handleFile('B',this)" style="display:none;">
        <div style="font-weight:700;">設備 B 備份</div>
        <div id="fnB" style="font-size:11px; color:var(--blue); margin-top:5px;">點擊選擇 ZIP</div>
      </div>
    </div>

    <div id="compareAction" style="display:none; text-align:center; margin-bottom:20px;">
        <button class="auth-btn" style="width:200px;" onclick="startComparison()">開始執行比對</button>
    </div>

    <div id="resultTabs" style="display:none;">
      <div class="tabs">
        <button class="tab-btn active" onclick="showTab('info', this)">CNC Info</button>
        <button class="tab-btn" onclick="showTab('mo', this)">Options<span class="badge" id="b-mo" style="display:none;"></span></button>
        <button class="tab-btn" onclick="showTab('ul', this)">User Level<span class="badge" id="b-ul" style="display:none;"></span></button>
      </div>

      <div id="pane-info" class="pane"></div>
      <div id="pane-mo" class="pane" style="display:none;"></div>
      <div id="pane-ul" class="pane" style="display:none;"></div>
    </div>
  </div>
</div>

<script>
/* --- Firebase 配置 (保持與您之前一致) --- */
const firebaseConfig = {
    apiKey: "AIzaSyAznXtBqrp8GDG6P387TXeuvHCiOQhJc4c",
    authDomain: "cnc5000-62bea.firebaseapp.com",
    databaseURL: "https://cnc5000-62bea-default-rtdb.firebaseio.com/",
    projectId: "cnc5000-62bea",
    storageBucket: "cnc5000-62bea.firebasestorage.app",
    messagingSenderId: "197550131427",
    appId: "1:197550131427:web:96da32dbabcb9d26359dd6"
};
firebase.initializeApp(firebaseConfig);

async function handleActivation() {
    const email = document.getElementById('authEmail').value;
    const code = document.getElementById('authCode').value;
    const msg = document.getElementById('authMsg');
    try {
        await firebase.auth().signInWithEmailAndPassword(email, code);
        const fp = await FingerprintJS.load();
        const result = await fp.get();
        const safeEmail = email.replace(/\./g, ',');
        firebase.database().ref('users/' + safeEmail).once('value', snap => {
            const d = snap.val() || { devices: [] };
            if (d.devices.includes(result.visitorId) || d.devices.length < 2) {
                if (!d.devices.includes(result.visitorId)) {
                    d.devices.push(result.visitorId);
                    firebase.database().ref('users/' + safeEmail).update({devices: d.devices});
                }
                document.getElementById('authOverlay').style.display='none';
                document.getElementById('mainApp').style.display='flex';
            } else { msg.innerText="裝置授權已滿"; msg.style.display='block'; }
        });
    } catch(e) { msg.innerText="驗證失敗"; msg.style.display='block'; }
}

/* --- 比對解析引擎 (移植自 v5.7) --- */
let zipA, zipB, dataA = {}, dataB = {};

function handleFile(side, input) {
    const file = input.files[0]; if(!file) return;
    document.getElementById('fn'+side).innerText = file.name;
    document.getElementById('up'+side).classList.add('active');
    
    const reader = new FileReader();
    reader.onload = async (e) => {
        const zip = await JSZip.loadAsync(e.target.result);
        if(side === 'A') zipA = zip; else zipB = zip;
        if(zipA && zipB) document.getElementById('compareAction').style.display='block';
    };
    reader.readAsArrayBuffer(file);
}

async function startComparison() {
    dataA = await parseZip(zipA);
    dataB = await parseZip(zipB);
    
    renderInfo();
    renderMO();
    renderUL();
    
    document.getElementById('resultTabs').style.display = 'block';
    document.getElementById('hStats').style.display = 'block';
}

async function parseZip(zip) {
    let result = { info: {}, mo: {}, ul: {} };
    
    // 1. CNC Info
    const fInfo = zip.file("cnc_info.txt");
    if(fInfo) {
        (await fInfo.async("string")).split('\n').forEach(line => {
            let p = line.split(':'); if(p.length >= 2) result.info[p[0].trim()] = p.slice(1).join(':').trim();
        });
    }

    // 2. Machine Options (支援 Section 解析)
    const fMO = zip.file("machine_options.txt");
    if(fMO) {
        let txt = await fMO.async("string"), currentSec = "General";
        txt.split('\n').forEach(line => {
            line = line.trim(); if(!line || line.startsWith(';')) return;
            let m = line.match(/^\[(.+)\]$/);
            if(m) currentSec = m[1];
            else {
                let p = line.split('=');
                if(p.length >= 2) {
                    if(!result.mo[currentSec]) result.mo[currentSec] = {};
                    result.mo[currentSec][p[0].trim()] = p.slice(1).join('=').trim();
                }
            }
        });
    }

    // 3. User Level
    const fUL = zip.file("user_level.txt");
    if(fUL) {
        (await fUL.async("string")).split('\n').forEach(line => {
            let p = line.split('='); if(p.length >= 2) result.ul[p[0].trim()] = p[1].trim();
        });
    }
    return result;
}

function renderInfo() {
    let html = '<div class="sec-block">', diffCount = 0;
    for(let k in dataA.info) {
        const vA = dataA.info[k], vB = dataB.info[k] || "缺失", isD = vA !== vB;
        if(isD) diffCount++;
        html += `<div class="row-item ${isD?'diff':''}"><div class="col-key">${k}</div><div>${isD?`<span class="old-val">${vA}</span><span class="new-val">${vB}</span>`:vA}</div></div>`;
    }
    document.getElementById('pane-info').innerHTML = html + '</div>';
}

function renderMO() {
    let html = '', totalDiff = 0, secCount = 0;
    for(let sec in dataA.mo) {
        secCount++; let subHtml = '', secDiff = 0;
        for(let k in dataA.mo[sec]) {
            const vA = dataA.mo[sec][k], vB = (dataB.mo[sec] && dataB.mo[sec][k]) ? dataB.mo[sec][k] : "缺失";
            const isD = vA !== vB;
            if(isD) { secDiff++; totalDiff++; }
            subHtml += `<div class="row-item ${isD?'diff':''}"><div class="col-key">${k}</div><div>${isD?`<span class="old-val">${vA}</span><span class="new-val">${vB}</span>`:vA}</div></div>`;
        }
        html += `<div class="sec-block">
            <div class="sec-hdr" onclick="toggleSec(this)"><span>▶ ${sec}</span> ${secDiff?`<span style="color:var(--warn)">(${secDiff})</span>`:''}</div>
            <div class="sec-body" style="${secDiff?'display:block':''}">${subHtml}</div>
        </div>`;
    }
    document.getElementById('pane-mo').innerHTML = html;
    document.getElementById('stSec').innerText = secCount;
    document.getElementById('stDif').innerText = totalDiff;
    if(totalDiff > 0) { const b = document.getElementById('b-mo'); b.innerText = totalDiff; b.style.display = 'inline'; }
}

function renderUL() {
    let html = '<div class="sec-block">', diffCount = 0;
    for(let k in dataA.ul) {
        const vA = dataA.ul[k], vB = dataB.ul[k] || "缺失", isD = vA !== vB;
        if(isD) diffCount++;
        html += `<div class="row-item ${isD?'diff':''}"><div class="col-key">${k}</div><div>${isD?`<span class="old-val">${vA}</span><span class="new-val">${vB}</span>`:vA}</div></div>`;
    }
    document.getElementById('pane-ul').innerHTML = html + '</div>';
    if(diffCount > 0) { const b = document.getElementById('b-ul'); b.innerText = diffCount; b.style.display = 'inline'; }
}

function toggleSec(el) {
    const body = el.nextElementSibling;
    body.style.display = (body.style.display === 'block') ? 'none' : 'block';
}

function showTab(type, btn) {
    document.querySelectorAll('.pane').forEach(p => p.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('pane-' + type).style.display = 'block';
    btn.classList.add('active');
}
</script>
</body>
</html>
