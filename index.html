<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>CNC5000 Compare v5.8</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
/* --- 復刻照片中的專業 UI 風格 --- */
:root { --bg:#0f1117; --card:#1a1d27; --border:#2e3244; --blue:#3b82f6; --blue-hover:#2563eb; --text:#e4e6ef; --sub:#8b8fa7; }
html,body { margin:0;padding:0;font-family:'Segoe UI','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);height:100%;overflow-x:hidden; }
*{box-sizing:border-box;}

/* 登入頁面樣式 (依據照片調整) */
#authOverlay { position:fixed;inset:0;z-index:20000;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px; }
.auth-box { 
    background:var(--card); border:1px solid var(--border); border-radius:20px; width:100%; max-width:440px; padding:45px; 
    box-shadow:0 25px 50px -12px rgba(0,0,0,0.6); animation:fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes fadeInUp { from{opacity:0;transform:translateY(30px);} to{opacity:1;transform:translateY(0);} }

.auth-header { text-align:center; margin-bottom:35px; }
.auth-logo { font-size:28px; font-weight:800; letter-spacing:-1px; margin-bottom:5px; }
.auth-subtitle { font-size:13px; color:var(--sub); font-weight:500; }

.input-field { margin-bottom:20px; position:relative; }
.input-field label { display:block; font-size:12px; color:var(--sub); margin-bottom:8px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
.auth-input { 
    width:100%; background:rgba(15,17,23,0.8); border:1px solid var(--border); padding:14px 18px; color:#fff; border-radius:10px; 
    font-size:16px; transition:all 0.3s; outline:none;
}
.auth-input:focus { border-color:var(--blue); box-shadow:0 0 0 4px rgba(59,130,246,0.15); background:#000; }

.main-btn { 
    width:100%; padding:15px; background:linear-gradient(135deg, var(--blue) 0%, #1d4ed8 100%); color:#fff; border:none; border-radius:10px; 
    font-weight:700; font-size:16px; cursor:pointer; transition:all 0.3s; box-shadow:0 4px 15px rgba(59,130,246,0.4);
}
.main-btn:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(59,130,246,0.5); filter:brightness(1.1); }

/* 主程式介面 */
.header { background:var(--card); border-bottom:1px solid var(--border); padding:15px 25px; display:flex; align-items:center; position:sticky; top:0; z-index:100; }
.header-title { font-size:16px; font-weight:700; }
.stats-group { margin-left:auto; display:flex; gap:20px; font-size:12px; font-weight:600; color:var(--sub); }
.stats-group span { color:#fff; }

.main { max-width:1400px; margin:0 auto; padding:20px; }
.upload-grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:20px; }
.up-card { background:var(--card); border:2px dashed var(--border); border-radius:12px; padding:35px; text-align:center; position:relative; transition:0.3s; cursor:pointer; }
.up-card:hover { border-color:var(--blue); background:rgba(59,130,246,0.03); }
.up-card.active { border-style:solid; border-color:#22c55e; background:rgba(34,197,94,0.05); }
.up-card input { position:absolute; inset:0; opacity:0; cursor:pointer; }

.tab-bar { display:flex; background:var(--card); padding:5px; border-radius:12px; margin-bottom:20px; border:1px solid var(--border); }
.tab-item { flex:1; padding:12px; border-radius:8px; border:none; background:none; color:var(--sub); font-weight:700; cursor:pointer; transition:0.2s; position:relative; }
.tab-item.active { background:var(--blue); color:#fff; box-shadow:0 4px 12px rgba(59,130,246,0.25); }
.badge { position:absolute; top:4px; right:6px; background:#ef4444; color:#fff; font-size:10px; padding:2px 6px; border-radius:10px; }

/* 數據列樣式 */
.res-container { background:var(--card); border-radius:12px; border:1px solid var(--border); overflow:hidden; }
.sec-row { border-bottom:1px solid var(--border); }
.sec-head { padding:14px 20px; background:#1e2230; cursor:pointer; font-weight:700; display:flex; align-items:center; }
.sec-body { display:none; background:#0f1117; }
.data-line { display:flex; padding:10px 20px; border-bottom:1px solid rgba(255,255,255,0.03); align-items:center; }
.data-line.diff { background:rgba(251,191,36,0.07); }
.data-key { width:350px; color:var(--sub); font-family:monospace; }
.val-old { color:#ef4444; text-decoration:line-through; margin-right:10px; }
.val-new { color:#22c55e; font-weight:700; background:rgba(34,197,94,0.1); padding:2px 5px; border-radius:4px; }

#mainApp { display: none; }
</style>
</head>
<body oncontextmenu="return false">

<div id="authOverlay">
  <div class="auth-box">
    <div class="auth-header">
      <div class="auth-logo">CNC5000 <span style="color:var(--blue)">Compare</span></div>
      <div class="auth-subtitle">SAP_TW 內部專用比對系統 v5.8</div>
    </div>
    
    <div class="input-field">
      <label>Email Address</label>
      <input type="email" id="authEmail" class="auth-input" placeholder="example@comp.com">
    </div>
    
    <div class="input-field">
      <label>Activation Code</label>
      <input type="password" id="authCode" class="auth-input" placeholder="••••••••">
    </div>
    
    <button onclick="handleActivation()" class="main-btn">登入系統</button>
    <div id="authMsg" style="color:#ef4444;font-size:12px;margin-top:20px;text-align:center;display:none;font-weight:600;"></div>
  </div>
</div>

<div id="mainApp">
  <div class="header">
    <div class="header-title">CNC5000 Compare <span style="font-weight:400;opacity:0.4;font-size:12px;margin-left:8px;">v5.8</span></div>
    <div class="stats-group" id="hStats" style="display:none;">
      SECTIONS <span id="stSec">0</span>
      FIELDS <span id="stFld">0</span>
      DIFFS <span id="stDif" style="color:#fbbf24;">0</span>
    </div>
  </div>

  <div class="main">
    <div class="upload-grid">
      <div class="up-card" id="upA">
        <input type="file" id="fA" accept=".zip" onchange="handleFile('A',this)" />
        <div style="font-weight:700;">設備 A 備份檔 (Source)</div>
        <div id="fnA" style="font-size:12px;color:var(--blue);margin-top:10px;"></div>
      </div>
      <div class="up-card" id="upB">
        <input type="file" id="fB" accept=".zip" onchange="handleFile('B',this)" />
        <div style="font-weight:700;">設備 B 備份檔 (Target)</div>
        <div id="fnB" style="font-size:12px;color:var(--blue);margin-top:10px;"></div>
      </div>
    </div>

    <div id="cmpWrap" style="display:none;text-align:center;margin-bottom:30px;">
        <button class="main-btn" style="max-width:350px;" onclick="doCompare()">執行比對程序</button>
    </div>

    <div id="tabWrap" style="display:none;">
      <div class="tab-bar">
        <button class="tab-item active" onclick="swTab('info',this)">CNC Info</button>
        <button class="tab-item" onclick="swTab('mo',this)">Machine Options<span class="badge" id="bMO" style="display:none;"></span></button>
        <button class="tab-item" onclick="swTab('ul',this)">User Level<span class="badge" id="bUL" style="display:none;"></span></button>
        <button class="tab-item" onclick="swTab('tm',this)">Tinman<span class="badge" id="bTM" style="display:none;"></span></button>
      </div>

      <div id="p-info" class="tab-pane"><div class="res-container" id="resInfo"></div></div>
      <div id="p-mo" class="tab-pane" style="display:none;"><div id="resMO"></div></div>
      <div id="p-ul" class="tab-pane" style="display:none;"><div class="res-container" id="resUL"></div></div>
      <div id="p-tm" class="tab-pane" style="display:none;"><div class="res-container" id="resTM"></div></div>
    </div>
  </div>
</div>

<script>
// --- Firebase 核心啟動 ---
const firebaseConfig = {
    apiKey: "AIzaSyAznXtBqrp8GDG6P387TXeuvHCiOQhJc4c",
    authDomain: "cnc5000-62bea.firebaseapp.com",
    databaseURL: "https://cnc5000-62bea-default-rtdb.firebaseio.com/",
    projectId: "cnc5000-62bea",
    storageBucket: "cnc5000-62bea.firebasestorage.app",
    messagingSenderId: "197550131427",
    appId: "1:197550131427:web:96da32dbabcb9d26359dd6"
};
firebase.initializeApp(firebaseConfig);

async function handleActivation() {
    const email = document.getElementById('authEmail').value;
    const code = document.getElementById('authCode').value;
    const msg = document.getElementById('authMsg');
    try {
        await firebase.auth().signInWithEmailAndPassword(email, code);
        const fp = await FingerprintJS.load();
        const result = await fp.get();
        const deviceId = result.visitorId;
        const safeEmail = email.replace(/\./g, ',');
        firebase.database().ref('users/' + safeEmail).once('value', (snap) => {
            let data = snap.val() || { devices: [] };
            if (data.devices.includes(deviceId) || data.devices.length < 2) {
                if (!data.devices.includes(deviceId)) {
                    data.devices.push(deviceId);
                    firebase.database().ref('users/' + safeEmail).update({ devices: data.devices });
                }
                document.getElementById('authOverlay').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
            } else { msg.innerText = "授權裝置已達上限"; msg.style.display='block'; }
        });
    } catch (e) { msg.innerText = "驗證資料有誤"; msg.style.display='block'; }
}

// --- 完全移植 v5.7 解析邏輯 ---
var zipA, zipB, dataA={}, dataB={};

function handleFile(side, input) {
    let file = input.files[0]; if(!file) return;
    document.getElementById('fn'+side).innerText = file.name;
    document.getElementById('up'+side).classList.add('active');
    let reader = new FileReader();
    reader.onload = async (e) => {
        let zip = await JSZip.loadAsync(e.target.result);
        if(side==='A') zipA = zip; else zipB = zip;
        if(zipA && zipB) document.getElementById('cmpWrap').style.display = 'block';
    };
    reader.readAsArrayBuffer(file);
}

async function parseBackup(zip) {
    let res = { info:{}, mo:{}, ul:{}, tm:{} };
    // CNC Info
    let fi = zip.file("cnc_info.txt");
    if(fi) {
        (await fi.async("string")).split('\n').forEach(l => {
            let p = l.split(':'); if(p.length>=2) res.info[p[0].trim()] = p.slice(1).join(':').trim();
        });
    }
    // Machine Options
    let fm = zip.file("machine_options.txt");
    if(fm) {
        let txt = await fm.async("string"), cur = "Default";
        txt.split('\n').forEach(l => {
            l = l.trim(); if(!l || l.startsWith(';')) return;
            let m = l.match(/^\[(.+)\]$/);
            if(m) cur = m[1];
            else {
                let p = l.split('=');
                if(p.length>=2) {
                    if(!res.mo[cur]) res.mo[cur] = {};
                    res.mo[cur][p[0].trim()] = p[1].trim();
                }
            }
        });
    }
    // User Level
    let fu = zip.file("user_level.txt");
    if(fu) {
        (await fu.async("string")).split('\n').forEach(l => {
            let p = l.split('='); if(p.length>=2) res.ul[p[0].trim()] = p[1].trim();
        });
    }
    return res;
}

async function doCompare() {
    dataA = await parseBackup(zipA);
    dataB = await parseBackup(zipB);
    renderAll();
    document.getElementById('tabWrap').style.display = 'block';
    document.getElementById('hStats').style.display = 'flex';
}

function renderAll() {
    // CNC Info
    let hInfo = '', dInfo = 0;
    for(let k in dataA.info) {
        let vA = dataA.info[k], vB = dataB.info[k] || "N/A", isD = vA !== vB;
        if(isD) dInfo++;
        hInfo += `<div class="data-line ${isD?'diff':''}"><div class="data-key">${k}</div><div>${isD?`<span class="val-old">${vA}</span><span class="val-new">${vB}</span>`:vA}</div></div>`;
    }
    document.getElementById('resInfo').innerHTML = hInfo;

    // Machine Options
    let hMO = '', dMO = 0, fCount = 0, sCount = 0;
    for(let s in dataA.mo) {
        sCount++; let sub = '', sd = 0;
        for(let k in dataA.mo[s]) {
            fCount++;
            let vA = dataA.mo[s][k], vB = (dataB.mo[s] && dataB.mo[s][k]) ? dataB.mo[s][k] : "MISSING";
            let isD = vA !== vB; if(isD) { dMO++; sd++; }
            sub += `<div class="data-line ${isD?'diff':''}"><div class="data-key">${k}</div><div>${isD?`<span class="val-old">${vA}</span><span class="val-new">${vB}</span>`:vA}</div></div>`;
        }
        hMO += `<div class="sec-row">
            <div class="sec-head" onclick="tg(this)">▶ ${s} ${sd?`<span style="color:#fbbf24;margin-left:10px;">(${sd})</span>`:''}</div>
            <div class="sec-body">${sub}</div>
        </div>`;
    }
    document.getElementById('resMO').innerHTML = hMO;
    document.getElementById('stSec').innerText = sCount;
    document.getElementById('stFld').innerText = fCount;
    document.getElementById('stDif').innerText = dMO;
    if(dMO>0){ let b=document.getElementById('bMO'); b.innerText=dMO; b.style.display='block'; }
    
    // 自動展開差異
    document.querySelectorAll('.sec-row').forEach(r => { if(r.querySelector('.diff')) r.querySelector('.sec-body').style.display='block'; });
}

function tg(el) { let b = el.nextElementSibling; b.style.display = (b.style.display==='block'?'none':'block'); }
function swTab(t, btn) {
    document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');
    btn.classList.add('active');
    document.getElementById('p-'+t).style.display = 'block';
}
</script>
</body>
</html>
