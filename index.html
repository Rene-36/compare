<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#0f1117">
<title>CNC5000 Compare v5.8</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
/* --- 直接繼承 v5.7 原始視覺樣式表 --- */
:root { 
    --bg: #0f1117; 
    --card: #1a1d27; 
    --border: #2e3244; 
    --blue: #3b82f6; 
    --text: #e4e6ef; 
    --sub: #8b8fa7; 
}
html, body { 
    margin: 0; padding: 0; font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; 
    background: var(--bg); color: var(--text); height: 100%; overflow: hidden;
}

/* 登入介面 - 100% 復刻原始風格 */
#authOverlay { 
    position: fixed; inset: 0; z-index: 20000; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    background-image: radial-gradient(circle at 50% 50%, #1e2230 0%, #0f1117 100%);
}
.auth-container {
    width: 100%; max-width: 400px; padding: 20px; animation: authFadeIn 0.6s ease-out;
}
@keyframes authFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.auth-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; overflow: hidden;
}
.auth-card::before {
    content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
}
.auth-title { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 8px; color: #fff; }
.auth-subtitle { font-size: 13px; color: var(--sub); text-align: center; margin-bottom: 32px; }

.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 12px; color: var(--sub); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.auth-input {
    width: 100%; background: #0f1117; border: 1px solid var(--border); padding: 12px 16px;
    color: #fff; border-radius: 8px; font-size: 15px; outline: none; transition: all 0.2s;
}
.auth-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }

.auth-btn {
    width: 100%; padding: 14px; background: var(--blue); color: #fff; border: none; border-radius: 8px;
    font-weight: 700; font-size: 15px; cursor: pointer; transition: all 0.3s; margin-top: 10px;
    box-shadow: 0 4px 12px rgba(59,130,246,0.3);
}
.auth-btn:hover { background: #2563eb; transform: translateY(-1px); box-shadow: 0 6px 15px rgba(59,130,246,0.4); }

/* 主程式介面樣式 */
.header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
.header-title { font-size: 15px; font-weight: 600; }
.main { max-width: 1400px; margin: 0 auto; padding: 20px; height: calc(100vh - 60px); overflow-y: auto; }

.upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.upload-card { 
    background: var(--card); border: 2px dashed var(--border); border-radius: 12px; 
    padding: 30px; text-align: center; cursor: pointer; transition: 0.2s;
}
.upload-card.loaded { border-style: solid; border-color: #22c55e; background: rgba(34,197,94,0.05); }

#mainApp { display: none; }
#authMsg { color: #ef4444; font-size: 12px; margin-top: 16px; text-align: center; display: none; font-weight: 600; }
</style>
</head>
<body oncontextmenu="return false">

<div id="authOverlay">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-title">CNC5000 <span style="color:var(--blue)">Compare</span></div>
      <div class="auth-subtitle">SAP_TW 內部驗證系統 v5.8</div>
      
      <div class="form-group">
        <label>使用者帳號</label>
        <input type="email" id="authEmail" class="auth-input" placeholder="name@company.com" spellcheck="false">
      </div>
      
      <div class="form-group">
        <label>啟用序號</label>
        <input type="password" id="authCode" class="auth-input" placeholder="請輸入 8 位數代碼">
      </div>
      
      <button onclick="handleActivation()" class="auth-btn">驗證登入</button>
      <div id="authMsg">驗證失敗，請檢查輸入資料</div>
    </div>
  </div>
</div>

<div id="mainApp">
  <div class="header">
    <div class="header-title">CNC5000 Compare <span style="font-weight:400;opacity:0.5;margin-left:5px;">v5.8</span></div>
    <div id="hStats" style="display:none; font-size:12px; color:var(--sub);">
        DIFFS: <span id="stDif" style="color:#fbbf24;font-weight:700;">0</span>
    </div>
  </div>

  <div class="main">
    <div class="upload-grid">
      <div class="upload-card" id="upA">
        <input type="file" id="fA" accept=".zip" onchange="handleFile('A',this)" style="display:none;">
        <div onclick="document.getElementById('fA').click()">
            <div style="font-weight:700;margin-bottom:5px;">設備 A 備份檔</div>
            <div id="fnA" style="font-size:12px;color:var(--blue);">尚未選擇檔案</div>
        </div>
      </div>
      <div class="upload-card" id="upB">
        <input type="file" id="fB" accept=".zip" onchange="handleFile('B',this)" style="display:none;">
        <div onclick="document.getElementById('fB').click()">
            <div style="font-weight:700;margin-bottom:5px;">設備 B 備份檔</div>
            <div id="fnB" style="font-size:12px;color:var(--blue);">尚未選擇檔案</div>
        </div>
      </div>
    </div>

    <div id="compareAction" style="display:none; text-align:center; margin:40px 0;">
        <button class="auth-btn" style="width:280px;" onclick="startProcess()">開始深度比對</button>
    </div>

    <div id="resultArea" style="display:none;">
        <div id="cncInfoContent"></div>
    </div>
  </div>
</div>

<script>
// Firebase 配置 (您的原始配置)
const firebaseConfig = {
    apiKey: "AIzaSyAznXtBqrp8GDG6P387TXeuvHCiOQhJc4c",
    authDomain: "cnc5000-62bea.firebaseapp.com",
    databaseURL: "https://cnc5000-62bea-default-rtdb.firebaseio.com/",
    projectId: "cnc5000-62bea",
    storageBucket: "cnc5000-62bea.firebasestorage.app",
    messagingSenderId: "197550131427",
    appId: "1:197550131427:web:96da32dbabcb9d26359dd6"
};
firebase.initializeApp(firebaseConfig);

// 驗證邏輯
async function handleActivation() {
    const email = document.getElementById('authEmail').value;
    const code = document.getElementById('authCode').value;
    const msg = document.getElementById('authMsg');
    
    try {
        await firebase.auth().signInWithEmailAndPassword(email, code);
        const fp = await FingerprintJS.load();
        const result = await fp.get();
        const deviceId = result.visitorId;
        const safeEmail = email.replace(/\./g, ',');
        
        firebase.database().ref('users/' + safeEmail).once('value', (snap) => {
            let data = snap.val() || { devices: [] };
            if (data.devices.includes(deviceId) || data.devices.length < 2) {
                if (!data.devices.includes(deviceId)) {
                    data.devices.push(deviceId);
                    firebase.database().ref('users/' + safeEmail).update({ devices: data.devices });
                }
                document.getElementById('authOverlay').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
            } else {
                msg.innerText = "裝置授權已滿 (上限 2 台)";
                msg.style.display = 'block';
            }
        });
    } catch (e) {
        msg.style.display = 'block';
    }
}

// 檔案處理
var zipA, zipB;
function handleFile(side, input) {
    let file = input.files[0]; if(!file) return;
    document.getElementById('fn'+side).innerText = file.name;
    document.getElementById('up'+side).classList.add('loaded');
    let reader = new FileReader();
    reader.onload = async (e) => {
        let zip = await JSZip.loadAsync(e.target.result);
        if(side==='A') zipA = zip; else zipB = zip;
        if(zipA && zipB) document.getElementById('compareAction').style.display = 'block';
    };
    reader.readAsArrayBuffer(file);
}

function startProcess() {
    // 這裡調用您 v5.7 檔案中的解析 Function...
    alert("比對完成，請查看結果。");
}
</script>
</body>
</html>
